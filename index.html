<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Remarket 未來市場 - 走道商品彩色完美版</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <style>
      #web-cart-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999; 
        background-color: #d11141;
        color: white;
        border: none;
        padding: 15px 25px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #web-cart-btn:hover {
        background-color: #a80d32;
        transform: scale(1.05);
      }
      #web-cart-btn:active {
        transform: scale(0.95);
      }
    </style>

    <script>
      // 全局購物車資料庫
      window.marketCart = [];

      // 更新右下角網頁購物車按鈕數量的函數
      function updateCartButtonVisual() {
        let cartCountEl = document.querySelector('#cart-count');
        if (cartCountEl) {
          cartCountEl.innerText = window.marketCart.length;
        }
      }

      // 開啟購物車明細的視窗
      function showCartDetails() {
        if (window.marketCart.length === 0) {
          alert("🛒 您的未來市場購物車目前是空的喔！\n\n快去市場走走，點擊桌上的在地新鮮食材吧！");
          return;
        }

        let listText = "📋 【Remarket 未來市場 - 您的選購清單】\n--------------------------------------------\n";
        let totalSum = 0;
        
        window.marketCart.forEach((item, index) => {
          listText += `${index + 1}. ${item.name} ----- NT$ ${item.priceText}\n`;
          totalSum += item.priceVal;
        });

        listText += `--------------------------------------------\n`;
        listText += `💰 目前透明價格預計總計：NT$ ${totalSum} 元\n\n`;
        listText += `💡 溫馨提醒：線上購物模擬完成！\n請保存此畫面或憑手機截圖，於實體市場營業時間內至各別攤位「實體取貨與付款」，用行動支持在地傳統人情味！`;

        alert(listText);
      }

      // 商品與 3D 按鈕點擊連動腳本
      AFRAME.registerComponent('shop-item', {
        schema: {
          id: {type: 'string', default: ''}
        },
        init: function () {
          let el = this.el;
          let data = this.data;

          el.addEventListener('mouseenter', function () {
            el.setAttribute('scale', '1.05 1.05 1.05');
          });
          el.addEventListener('mouseleave', function () {
            el.setAttribute('scale', '1 1 1');
          });

          el.addEventListener('click', function () {
            let itemName = el.getAttribute('data-name');
            let itemPriceStr = el.getAttribute('data-price');
            let priceNum = parseInt(itemPriceStr.replace(/[^0-9]/g, '')) || 0;

            let alreadyInCart = window.marketCart.some(item => item.id === data.id);
            if (alreadyInCart) {
              alert(`💡 【${itemName}】已經在您的購物車裡囉！`);
              return;
            }

            window.marketCart.push({
              id: data.id,
              name: itemName,
              priceText: itemPriceStr,
              priceVal: priceNum
            });

            updateCartButtonVisual();

            let btnPlane = document.querySelector(`#btn-txt-${data.id}`);
            if (btnPlane) {
              btnPlane.setAttribute('canvas-text', "text: ✅ 已加入; color: #ffffff; bgColor: #2ecc71");
            }

            alert(`🛒 已成功加入購物車！\n\n【${itemName}】\n💰 透明價格：NT$ ${itemPriceStr}`);
          });
        }
      });

      // Canvas 2D 紋理生成器
      AFRAME.registerComponent('canvas-text', {
        schema: {
          text: {type: 'string', default: ''},
          color: {type: 'string', default: '#ffffff'},
          bgColor: {type: 'string', default: '#4a2f13'},
          isPoster: {type: 'boolean', default: false},
          isNpc: {type: 'boolean', default: false},
          isBtn: {type: 'boolean', default: false}
        },
        init: function () {
          this.updateTexture();
        },
        update: function () {
          this.updateTexture();
        },
        updateTexture: function () {
          let data = this.data;
          let canvas = document.createElement('canvas');
          let ctx = canvas.getContext('2d');
          
          if (data.isPoster) {
            canvas.width = 512;
            canvas.height = 768;
            ctx.fillStyle = data.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = data.color;
            ctx.font = "bold 32px sans-serif";
            let lines = data.text.split('\\n');
            for (let i = 0; i < lines.length; i++) {
              ctx.fillText(lines[i], 40, 80 + (i * 50));
            }
          } else if (data.isNpc) {
            canvas.width = 512;
            canvas.height = 256;
            ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#d11141";
            ctx.lineWidth = 6;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#d11141";
            ctx.font = "bold 30px sans-serif";
            let lines = data.text.split('\\n');
            for (let i = 0; i < lines.length; i++) {
              ctx.fillText(lines[i], 30, 60 + (i * 45));
            }
          } else if (data.isBtn) {
            canvas.width = 256;
            canvas.height = 84;
            ctx.fillStyle = data.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = data.color;
            ctx.font = "bold 28px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(data.text, 128, 42);
          } else {
            canvas.width = 512;
            canvas.height = 128;
            ctx.fillStyle = data.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = data.color;
            ctx.font = "bold 34px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            let lines = data.text.split('\\n');
            if (lines[1]) {
              ctx.fillText(lines[0], 256, 40);
              ctx.font = "28px sans-serif";
              ctx.fillText(lines[1], 256, 90);
            } else {
              ctx.fillText(lines[0], 256, 64);
            }
          }

          let texture = new THREE.CanvasTexture(canvas);
          let mesh = this.el.getObject3D('mesh');
          if (mesh) {
            mesh.material.map = texture;
            mesh.material.needsUpdate = true;
          } else {
            this.el.addEventListener('object3dset', () => {
              let nextMesh = this.el.getObject3D('mesh');
              if (nextMesh) {
                nextMesh.material.map = texture;
                nextMesh.material.needsUpdate = true;
              }
            });
          }
        }
      });
    </script>
  </head>
