<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Remarket 未來市場 - 雨棚挑高完美版</title>
    <!-- 引入 A-Frame 框架 -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
      // 點擊購物功能的中文互動腳本
      AFRAME.registerComponent('shop-item', {
        init: function () {
          let el = this.el;
          el.addEventListener('mouseenter', function () {
            el.setAttribute('animation__hover', 'property: scale; to: 1.05 1.05 1.05; dur: 200');
          });
          el.addEventListener('mouseleave', function () {
            el.setAttribute('animation__hover', 'property: scale; to: 1 1 1; dur: 200');
          });
          el.addEventListener('click', function () {
            let itemName = el.getAttribute('data-name');
            let itemPrice = el.getAttribute('data-price');
            alert(`🛒 已加入購物車：【${itemName}】\n💰 透明價格：NT$ ${itemPrice}\n\n💡 溫馨提醒：線上購買完成！\n請於實體市場營業時間內，憑手機畫面至該攤位「實體取貨」，一同保留並感受傳統市場的在地人情味！`);
          });
        }
      });

      // HTML Canvas 2D 紋理貼圖技術
      AFRAME.registerComponent('canvas-text', {
        schema: {
          text: {type: 'string', default: ''},
          color: {type: 'string', default: '#ffffff'},
          bgColor: {type: 'string', default: '#4a2f13'},
          isPoster: {type: 'boolean', default: false},
          isNpc: {type: 'boolean', default: false}
        },
        init: function () {
          let data = this.data;
          let canvas = document.createElement('canvas');
          let ctx = canvas.getContext('2d');
          
          if (data.isPoster) {
            canvas.width = 512;
            canvas.height = 768;
            ctx.fillStyle = data.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = data.color;
            ctx.font = "bold 32px sans-serif";
            let lines = data.text.split('\\n');
            for (let i = 0; i < lines.length; i++) {
              ctx.fillText(lines[i], 40, 80 + (i * 50));
            }
          } else if (data.isNpc) {
            canvas.width = 512;
            canvas.height = 256;
            ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#d11141";
            ctx.lineWidth = 6;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#d11141";
            ctx.font = "bold 30px sans-serif";
            let lines = data.text.split('\\n');
            for (let i = 0; i < lines.length; i++) {
              ctx.fillText(lines[i], 30, 60 + (i * 45));
            }
          } else {
            canvas.width = 512;
            canvas.height = 128;
            ctx.fillStyle = data.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = data.color;
            ctx.font = "bold 36px sans-serif";
            let lines = data.text.split('\\n');
            ctx.fillText(lines[0], 20, 50);
            ctx.font = "30px sans-serif";
            if(lines[1]) ctx.fillText(lines[1], 20, 100);
          }

          let texture = new THREE.CanvasTexture(canvas);
          let mesh = this.el.getObject3D('mesh');
          if (mesh) {
            mesh.material.map = texture;
            mesh.material.needsUpdate = true;
          } else {
            this.el.addEventListener('object3dset', () => {
              let nextMesh = this.el.getObject3D('mesh');
              if (nextMesh) {
                nextMesh.material.map = texture;
                nextMesh.material.needsUpdate = true;
              }
            });
          }
        }
      });
    </script>
  </head>
