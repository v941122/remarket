<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Remarket 未來市場 - 網頁原生購物車最終版</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <style>
      #web-cart-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999; /* 確保永遠在最上層，不被3D場景遮擋 */
        background-color: #d11141;
        color: white;
        border: none;
        padding: 15px 25px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #web-cart-btn:hover {
        background-color: #a80d32;
        transform: scale(1.05);
      }
      #web-cart-btn:active {
        transform: scale(0.95);
      }
    </style>

    <script>
      // 全局購物車資料庫陣列
      window.marketCart = [];

      // 更新畫面上購物車按鈕數量的函數（直接操作網頁 HTML）
      function updateCartButtonVisual() {
        let cartCountEl = document.querySelector('#cart-count');
        if (cartCountEl) {
          cartCountEl.innerText = window.marketCart.length;
        }
      }

      // 開啟購物車明細的函數
      function showCartDetails() {
        if (window.marketCart.length === 0) {
          alert("🛒 您的未來市場購物車目前是空的喔！\n\n快去市場走走，點擊桌上的在地新鮮食材吧！");
          return;
        }

        let listText = "📋 【Remarket 未來市場 - 您的選購清單】\n--------------------------------------------\n";
        let totalSum = 0;
        
        window.marketCart.forEach((item, index) => {
          listText += `${index + 1}. ${item.name} ----- NT$ ${item.priceText}\n`;
          totalSum += item.priceVal;
        });

        listText += `--------------------------------------------\n`;
        listText += `💰 目前透明價格預計總計：NT$ ${totalSum} 元\n\n`;
        listText += `💡 溫馨提醒：線上購物模擬完成！\n請保存此畫面或憑手機截圖，於實體市場營業時間內至各別攤位「實體取貨與付款」，用行動支持在地傳統人情味！`;

        alert(listText);
      }

      // 點擊 3D 商品加入購物車的互動腳本
      AFRAME.registerComponent('shop-item', {
        init: function () {
          let el = this.el;
          el.addEventListener('mouseenter', function () {
            el.setAttribute('animation__hover', 'property: scale; to: 1.05 1.05 1.05; dur: 200');
          });
          el.addEventListener('mouseleave', function () {
            el.setAttribute('animation__hover', 'property: scale; to: 1 1 1; dur: 200');
          });
          el.addEventListener('click', function () {
            let itemName = el.getAttribute('data-name');
            let itemPriceStr = el.getAttribute('data-price');
            
            // 提取價格中的數字以計算總金額
            let priceNum = parseInt(itemPriceStr.replace(/[^0-9]/g, '')) || 0;

            // 將商品推入購物車陣列
            window.marketCart.push({
              name: itemName,
              priceText: itemPriceStr,
              priceVal: priceNum
            });

            // 即時更新右下角網頁購物車按鈕文字
            updateCartButtonVisual();

            alert(`🛒 已成功加入購物車！\n\n【${itemName}】\n💰 透明價格：NT$ ${itemPriceStr}\n\n💡 提示：您可以點擊右下角懸浮按鈕查看所有已選購的清單與總金額喔！`);
          });
        }
      });

      // HTML Canvas 2D 紋理貼圖技術（用於攤位招牌與二十四節氣海報）
      AFRAME.registerComponent('canvas-text', {
        schema: {
          text: {type: 'string', default: ''},
          color: {type: 'string', default: '#ffffff'},
          bgColor: {type: 'string', default: '#4a2f13'},
          isPoster: {type: 'boolean', default: false},
          isNpc: {type: 'boolean', default: false}
        },
        init: function () {
          let data = this.data;
          let canvas = document.createElement('canvas');
          let ctx = canvas.getContext('2d');
          
          if (data.isPoster) {
            canvas.width = 512;
            canvas.height = 768;
            ctx.fillStyle = data.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = data.color;
            ctx.font = "bold 32px sans-serif";
            let lines = data.text.split('\\n');
            for (let i = 0; i < lines.length; i++) {
              ctx.fillText(lines[i], 40, 80 + (i * 50));
            }
          } else if (data.isNpc) {
            canvas.width = 512;
            canvas.height = 256;
            ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#d11141";
            ctx.lineWidth = 6;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#d11141";
            ctx.font = "bold 30px sans-serif";
            let lines = data.text.split('\\n');
            for (let i = 0; i < lines.length; i++) {
              ctx.fillText(lines[i], 30, 60 + (i * 45));
            }
          } else {
            canvas.width = 512;
            canvas.height = 128;
            ctx.fillStyle = data.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = data.color;
            ctx.font = "bold 34px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            let lines = data.text.split('\\n');
            if (lines[1]) {
              ctx.fillText(lines[0], 256, 40);
              ctx.font = "28px sans-serif";
              ctx.fillText(lines[1], 256, 90);
            } else {
              ctx.fillText(lines[0], 256, 64);
            }
          }

          let texture = new THREE.CanvasTexture(canvas);
          let mesh = this.el.getObject3D('mesh');
          if (mesh) {
            mesh.material.map = texture;
            mesh.material.needsUpdate = true;
          } else {
            this.el.addEventListener('object3dset', () => {
              let nextMesh = this.el.getObject3D('mesh');
              if (nextMesh) {
                nextMesh.material.map = texture;
                nextMesh.material.needsUpdate = true;
              }
            });
          }
        }
      });
    </script>
  </head>
  <body>

      🛒 檢視購物車 (<span id="cart-count">0</span>)
    </button>

        <a-box position="-1 3.31 0" width="0.3" height="0.12" depth="2.22" color="#ffffff" rotation="5 0 0"></a-box>
        <a-box position="1 3.31 0" width="0.3" height="0.12" depth="2.22" color="#ffffff" rotation="5 0 0"></a-box>
        <a-sphere position="0 2.1 0" radius="0.15" color="#ffaa00" material="emissive: #ffaa00; emissiveIntensity: 2"></a-sphere>

        <a-plane position="-1.62 1.3 -0.3" rotation="0 90 0" width="1.2" height="1.5" color="#fffef0" canvas-text="text: 【二十四節氣 - 立春】\n\n春屬木，此時宜吃韭菜、\n豆芽與辛甘發散之物，\n有助益於脾胃陽氣升發，\n順應天時照顧肝臟健康。; color: #8b0000; bgColor: #fffef0; isPoster: true"></a-plane>
        
        <a-image src="#owner1" position="0 1.4 -0.3" width="1.4" height="1.4" material="transparent: true; alphaTest: 0.3"></a-image>
        <a-plane position="0 2.15 -0.3" width="1.8" height="0.7" canvas-text="text: 阿蓮姨：「少年仔！\n今那日的高麗菜透早剛到\n，現採的真甜喔！」; isNpc: true"></a-plane>
      </a-entity>


      <a-entity position="4 0 -4" rotation="0 -15 0">
        <a-box position="0 0.4 0" width="3.2" height="0.8" depth="2" color="#666b5c" roughness="0.9"></a-box>
        <a-box position="0 0.85 0" width="3" height="0.1" depth="1.8" color="#c7a781"></a-box>
        <a-box position="0 3.3 0" width="3.4" height="0.1" depth="2.2" color="#ff4d4d" rotation="5 0 0"></a-box>
        <a-box position="-0.5 3.31 0" width="0.3" height="0.12" depth="2.22" color="#ffffff" rotation="5 0 0"></a-box>
        <a-box position="0.5 3.31 0" width="0.3" height="0.12" depth="2.22" color="#ffffff" rotation="5 0 0"></a-box>
        <a-cylinder position="-0.6 1.4 0.4" radius="0.02" height="1.0" color="#444444"></a-cylinder>
        <a-sphere position="-0.6 0.95 0.4" radius="0.15" color="#ff3333" material="emissive: #ff1111; emissiveIntensity: 2"></a-sphere>
        
        <a-image src="#item2" position="0.1 0.98 0.3" rotation="10 30 0" width="0.55" height="0.4" class="clickable" data-name="台灣溫體豬五花" data-price="160 元" shop-item material="transparent: true; alphaTest: 0.5"></a-image>
        
        <a-plane position="0 1.25 0.95" width="2.4" height="0.6" canvas-text="text: 2. 阿宏黑豬肉\n本地黑豬肉五花：$160/斤; color: #ffffff; bgColor: #2d4a13"></a-plane>
        <a-plane position="1.62 1.3 -0.3" rotation="0 -90 0" width="1.2" height="1.5" color="#fffef0" canvas-text="text: 【二十四節氣 - 大寒】\n\n一年中最冷之時，為進補\n好時機！適合搭配排骨、\n老薑與麻油燉煮薑母熱湯，\n驅寒溫補、活絡氣血。; color: #8b0000; bgColor: #fffef0; isPoster: true"></a-plane>
        
        <a-image src="#owner2" position="0 1.4 -0.3" width="1.4" height="1.4" material="transparent: true; alphaTest: 0.3"></a-image>
