<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Remarket 未來市場 - 台灣味元宇宙 V2</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
      // 點擊購物功能的互動腳本
      AFRAME.registerComponent('shop-item', {
        init: function () {
          let el = this.el;
          // 加上滑鼠懸停效果，讓觀眾知道可以點擊
          el.addEventListener('mouseenter', function () {
            el.setAttribute('animation__hover', 'property: scale; to: 1.1 1.1 1.1; dur: 200');
          });
          el.addEventListener('mouseleave', function () {
            el.setAttribute('animation__hover', 'property: scale; to: 1 1 1; dur: 200');
          });
          el.addEventListener('click', function () {
            let itemName = el.getAttribute('data-name');
            let itemPrice = el.getAttribute('data-price');
            alert(`🛒 已加入購物車：【${itemName}】\n💰 透明價格：NT$ ${itemPrice}\n\n💡 溫馨提醒：線上購買完成！請於實體市場營業時間內，憑手機畫面至該攤位「實體取貨」，支持在地小商販！`);
          });
        }
      });
    </script>
  </head>
